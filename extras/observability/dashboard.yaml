apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-paper
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  paper-server.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "title": "Server Overview",
          "type": "row",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
        },
        {
          "title": "Players Online",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(mc_players_online_total)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 15 },
                  { "color": "red", "value": 20 }
                ]
              }
            }
          }
        },
        {
          "title": "TPS (Ticks Per Second)",
          "type": "gauge",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "mc_tps",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "min": 0,
              "max": 20,
              "thresholds": {
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 15 },
                  { "color": "green", "value": 19 }
                ]
              }
            }
          }
        },
        {
          "title": "Loaded Chunks",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(mc_loaded_chunks_total)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 500 },
                  { "color": "red", "value": 1000 }
                ]
              }
            }
          }
        },
        {
          "title": "Total Entities",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(mc_entities_total)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 200 },
                  { "color": "red", "value": 500 }
                ]
              }
            }
          }
        },
        {
          "title": "Performance",
          "type": "row",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 }
        },
        {
          "title": "TPS Over Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "mc_tps",
              "legendFormat": "TPS",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 20 },
              "unit": "short",
              "min": 0,
              "max": 20
            }
          }
        },
        {
          "title": "Tick Duration",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "mc_tick_duration_average",
              "legendFormat": "Average",
              "refId": "A"
            },
            {
              "expr": "mc_tick_duration_max",
              "legendFormat": "Max",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 10 },
              "unit": "ns"
            }
          }
        },
        {
          "title": "JVM",
          "type": "row",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 }
        },
        {
          "title": "JVM Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "mc_jvm_memory{type=\"allocated\"}",
              "legendFormat": "Allocated",
              "refId": "A"
            },
            {
              "expr": "mc_jvm_memory{type=\"max\"}",
              "legendFormat": "Max",
              "refId": "B"
            },
            {
              "expr": "mc_jvm_memory{type=\"free\"}",
              "legendFormat": "Free",
              "refId": "C"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 20 },
              "unit": "bytes"
            }
          }
        },
        {
          "title": "JVM Threads",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "mc_jvm_threads_current",
              "legendFormat": "Current",
              "refId": "A"
            },
            {
              "expr": "mc_jvm_threads_daemon",
              "legendFormat": "Daemon",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 10 },
              "unit": "short"
            }
          }
        },
        {
          "title": "Players",
          "type": "row",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 }
        },
        {
          "title": "Players Online Over Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(mc_players_online_total)",
              "legendFormat": "Players",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 30 },
              "unit": "short"
            }
          }
        },
        {
          "title": "World Size",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(mc_world_size)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 104857600 },
                  { "color": "red", "value": 524288000 }
                ]
              }
            }
          }
        },
        {
          "title": "Total Players (All Time)",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "mc_players_total",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["minecraft", "papermc", "workshop"],
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "PaperMC Server",
      "uid": "workshop-paper",
      "version": 1
    }
    