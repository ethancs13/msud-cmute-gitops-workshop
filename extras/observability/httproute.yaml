apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: paper-gateway
      namespace: paper
      sectionName: grafana-https
  hostnames:
    - grafana.<YOUR_NAME>.mc.labs.cmute.cloud
  rules:
    - backendRefs:
        - name: prometheus-stack-grafana
          port: 80